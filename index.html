<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>은봉초 6-1 자기관리 어플</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #EFF7F4; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

/* =====================================================================
   ⚠️ 여기 한 줄만 바꾸면 연동돼요.
   구글 Apps Script를 "웹 앱"으로 배포하면 나오는 …/exec 로 끝나는 URL을 넣으세요.
===================================================================== */
const API_URL = "https://script.google.com/macros/s/AKfycbxWEOe83apF6t9SKingP_iIC_Lx3vqMAyPrZkrb6gNTBKZo-r6QpyudI-Ua29EDEHFS/exec";
async function apiGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_URL}?${qs}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "unknown error");
  return json.data;
}

async function apiPost(action, body = {}) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...body }),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "unknown error");
  return json.data;
}

/* ---------------- 데이터 정의 ---------------- */

const ITEMS = [
  { id: "ruler", emoji: "🌈", title: "감정 RULER", desc: "오늘 무드미터와 감정 RULER로 내 감정을 인식하고 표현했어요", type: "check" },
  { id: "diary", emoji: "📔", title: "다이어리", desc: "오늘 할 일 & 어제 다섯 줄 기록을 썼어요", type: "check" },
  { id: "cornell", emoji: "📝", title: "코넬공책", desc: "오늘 코넬공책을 다 썼어요", type: "check" },
  { id: "speak", emoji: "🙋", title: "발표 2번 이상", desc: "발표할 때마다 눌러서 기록해요", type: "count", goal: 2 },
  { id: "classwork", emoji: "✏️", title: "수업 과제", desc: "수업 과제를 다 했어요", type: "check" },
  { id: "homework", emoji: "🏠", title: "숙제", desc: "숙제를 다 했어요", type: "check" },
  { id: "checkinout", emoji: "💬", title: "체크인 · 체크아웃", desc: "오늘 체크인/체크아웃 대화를 나눴어요", type: "check" },
  { id: "roleclean", emoji: "🧺", title: "1인1역 · 자리 정리", desc: "내가 맡은 역할과 자리·서랍 정리를 했어요", type: "check" },
  { id: "noticeReply", emoji: "💌", title: "어제 알림장 댓글", desc: "어제 알림장에 댓글을 남겼어요", type: "check" },
];

const COLORS = {
  bg: "#EFF7F4",
  card: "#FFFFFF",
  ink: "#20313B",
  sub: "#6B7C86",
  teal: "#189A82",
  tealDark: "#0F7563",
  coral: "#FF6F59",
  yellow: "#FFC857",
  line: "#DCEDE7",
};

function todayStr() {
  return new Date().toLocaleDateString("en-CA");
}

function prettyDate(d) {
  const dt = new Date(d + "T00:00:00");
  const days = ["일", "월", "화", "수", "목", "금", "토"];
  return `${dt.getMonth() + 1}월 ${dt.getDate()}일 (${days[dt.getDay()]})`;
}

function emptyItems() {
  return {
    ruler: { done: false },
    diary: { done: false },
    cornell: { done: false },
    speak: { count: 0 },
    classwork: { done: false },
    homework: { done: false },
    checkinout: { done: false },
    roleclean: { done: false },
    noticeReply: { done: false },
  };
}

function isDone(item, data) {
  if (!data) return false;
  switch (item.type) {
    case "count": return data.count >= item.goal;
    case "check": return !!data.done;
    default: return false;
  }
}

/* ---------------- 메인 컴포넌트 ---------------- */

function App() {
  const [stage, setStage] = useState("loading");
  // loading | role | studentPick | pin | loadingRecord | student | teacherPin | teacher
  const [roster, setRoster] = useState([]);
  const [pendingNumber, setPendingNumber] = useState(null);
  const [pinMode, setPinMode] = useState("verify"); // verify | create
  const [pinInputVal, setPinInputVal] = useState("");
  const [pinInputVal2, setPinInputVal2] = useState("");
  const [pinStageError, setPinStageError] = useState("");

  const [studentNumber, setStudentNumber] = useState(null);
  const [date] = useState(todayStr());
  const [record, setRecord] = useState(null);
  const [saving, setSaving] = useState(false);
  const [activeItem, setActiveItem] = useState(null);
  const [toast, setToast] = useState("");
  const [loadErr, setLoadErr] = useState("");

  const [teacherPin, setTeacherPin] = useState("0601");
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");
  const [viewDate, setViewDate] = useState(todayStr());
  const [dayRecords, setDayRecords] = useState({});
  const [loadingTeacher, setLoadingTeacher] = useState(false);
  const [newNumber, setNewNumber] = useState("");
  const [showPinChange, setShowPinChange] = useState(false);
  const [pinChangeVal, setPinChangeVal] = useState("");
  const [breakdownView, setBreakdownView] = useState("item");

  useEffect(() => {
    (async () => {
      try {
        const r = await apiGet("getRoster");
        setRoster(Array.isArray(r) ? r : []);
        const p = await apiGet("getTeacherPin");
        setTeacherPin(p || "0601");
        setStage("role");
      } catch (e) {
        setLoadErr("서버 연결에 실패했어요. API_URL 설정을 확인해주세요. (" + e.message + ")");
        setStage("role");
      }
    })();
  }, []);

  function flashToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(""), 3200);
  }

  async function saveRosterList(list) {
    setRoster(list);
    try { await apiPost("saveRoster", { numbers: list }); }
    catch { flashToast("명단 저장에 실패했어요"); }
  }

  async function chooseNumber(n) {
    setPendingNumber(n);
    setPinInputVal(""); setPinInputVal2(""); setPinStageError("");
    try {
      const existing = await apiGet("getPin", { number: n });
      setPinMode(existing ? "verify" : "create");
    } catch {
      setPinMode("create");
    }
    setStage("pin");
  }

  async function submitPin() {
    if (pinMode === "create") {
      if (pinInputVal.length !== 4 || !/^\d{4}$/.test(pinInputVal)) {
        setPinStageError("숫자 4자리로 정해주세요"); return;
      }
      if (pinInputVal !== pinInputVal2) {
        setPinStageError("두 번 입력한 숫자가 달라요"); return;
      }
      try {
        await apiPost("setPin", { number: pendingNumber, pin: pinInputVal });
      } catch {
        setPinStageError("저장에 실패했어요. 다시 시도해주세요"); return;
      }
      enterStudent(pendingNumber);
    } else {
      try {
        const savedPin = await apiGet("getPin", { number: pendingNumber });
        if (savedPin === pinInputVal) enterStudent(pendingNumber);
        else setPinStageError("번호가 달라요. 다시 확인해주세요");
      } catch {
        setPinStageError("확인 중 문제가 생겼어요. 다시 시도해주세요");
      }
    }
  }

  async function enterStudent(n) {
    setStudentNumber(n);
    setStage("loadingRecord");
    try {
      const r = await apiGet("getRecord", { date, number: n });
      setRecord(r ? { number: n, date, items: r.items } : { number: n, date, items: emptyItems() });
    } catch {
      setRecord({ number: n, date, items: emptyItems() });
    }
    setStage("student");
  }

  const persist = useCallback(async (nextRecord) => {
    setRecord(nextRecord);
    setSaving(true);
    try {
      await apiPost("saveRecord", { date, number: studentNumber, items: nextRecord.items });
    } catch {
      flashToast("저장이 안 됐어요. 다시 시도해주세요");
    }
    setSaving(false);
  }, [date, studentNumber]);

  function updateItem(id, patch) {
    const next = {
      ...record,
      items: { ...record.items, [id]: { ...record.items[id], ...patch } },
      updatedAt: Date.now(),
    };
    persist(next);
  }

  async function loadTeacherDay(d) {
    setLoadingTeacher(true);
    try {
      const recs = await apiGet("listRecords", { date: d });
      setDayRecords(recs || {});
    } catch {
      flashToast("불러오기에 실패했어요");
    } finally {
      setLoadingTeacher(false);
    }
  }

  async function viewPin(n) {
    try {
      const savedPin = await apiGet("getPin", { number: n });
      flashToast(savedPin ? `${n}번 PIN: ${savedPin}` : `${n}번은 아직 PIN을 만들지 않았어요`);
    } catch {
      flashToast("조회에 실패했어요");
    }
  }

  async function resetPin(n) {
    try {
      await apiPost("deletePin", { number: n });
      flashToast(`${n}번 PIN을 초기화했어요`);
    } catch {
      flashToast("초기화에 실패했어요");
    }
  }

  function goRole() {
    setStage("role"); setStudentNumber(null); setRecord(null); setActiveItem(null);
    setPendingNumber(null); setPinInputVal(""); setPinInputVal2(""); setPinStageError("");
  }

  const doneCount = record ? ITEMS.filter((it) => isDone(it, record.items[it.id])).length : 0;
  const allDone = doneCount === ITEMS.length;

  if (stage === "loading") {
    return <Shell><Center>불러오는 중이에요…</Center></Shell>;
  }

  if (stage === "role") {
    return (
      <Shell>
        <Header title="은봉초 6-1 자기관리 어플" subtitle="오늘의 미션을 스스로 체크해봐요" />
        {loadErr && <div className="loadErr">{loadErr}</div>}
        <div style={{ display: "flex", flexDirection: "column", gap: 14, marginTop: 26 }}>
          <BigButton color={COLORS.teal} onClick={() => setStage("studentPick")}>
            🙋‍♀️ 나는 학생이에요
          </BigButton>
          <BigButton color={COLORS.ink} onClick={() => { setStage("teacherPin"); setPinInput(""); setPinError(""); }}>
            🧑‍🏫 나는 선생님이에요
          </BigButton>
        </div>
        <StyleTag />
      </Shell>
    );
  }

  if (stage === "studentPick") {
    return (
      <Shell>
        <TopBar onBack={goRole} title="내 번호를 골라주세요" />
        {roster.length === 0 ? (
          <EmptyBox>아직 반 명단이 없어요.<br />선생님 모드에서 먼저 번호를 등록해주세요.</EmptyBox>
        ) : (
          <div className="numberGrid">
            {[...roster].sort((a, b) => a - b).map((n) => (
              <button key={n} className="numBtn" onClick={() => chooseNumber(n)}>{n}</button>
            ))}
          </div>
        )}
        <StyleTag />
      </Shell>
    );
  }

  if (stage === "pin") {
    return (
      <Shell>
        <TopBar onBack={() => setStage("studentPick")} title={`${pendingNumber}번`} />
        {pinMode === "create" ? (
          <>
            <div className="pinHint">처음이네요! 나만 아는 숫자 4자리를 정해주세요.<br />다음에 들어올 때도 이 번호로 확인해요.</div>
            <input className="pinBoxInput" type="password" inputMode="numeric" maxLength={4}
              placeholder="4자리 숫자" value={pinInputVal} onChange={(e) => setPinInputVal(e.target.value.replace(/\D/g, ""))} />
            <input className="pinBoxInput" type="password" inputMode="numeric" maxLength={4}
              placeholder="한 번 더 입력" value={pinInputVal2} onChange={(e) => setPinInputVal2(e.target.value.replace(/\D/g, ""))} />
          </>
        ) : (
          <>
            <div className="pinHint">{pendingNumber}번 학생 확인을 위해 PIN 4자리를 입력해주세요.</div>
            <input className="pinBoxInput" type="password" inputMode="numeric" maxLength={4}
              placeholder="4자리 숫자" value={pinInputVal} onChange={(e) => setPinInputVal(e.target.value.replace(/\D/g, ""))} />
          </>
        )}
        {pinStageError && <div className="pinErr">{pinStageError}</div>}
        <BigButton color={COLORS.teal} onClick={submitPin}>{pinMode === "create" ? "PIN 만들기" : "확인"}</BigButton>
        {pinMode === "verify" && <div className="forgotHint">PIN을 잊어버렸다면 선생님께 초기화를 요청해주세요.</div>}
        <StyleTag />
      </Shell>
    );
  }

  if (stage === "loadingRecord") {
    return <Shell><Center>{studentNumber}번 정보를 불러오는 중…</Center></Shell>;
  }

  if (stage === "student") {
    return (
      <Shell>
        <TopBar onBack={goRole} title={`${studentNumber}번`} right={<DateChip text={prettyDate(date)} />} />
        <ProgressBar done={doneCount} total={ITEMS.length} allDone={allDone} />
        {allDone && <div className="celebrate">오늘의 미션 올클리어! 🎉 정말 멋져요!</div>}
        <div className="stampgrid">
          {ITEMS.map((item) => {
            const data = record.items[item.id];
            const done = isDone(item, data);
            return (
              <button key={item.id} className={"stamp" + (done ? " done" : "")} onClick={() => setActiveItem(item.id)}>
                <div className="stampEmoji">{item.emoji}</div>
                <div className="stampTitle">{item.title}</div>
                {done ? <div className="stampCheck">✔</div> : <div className="stampHint">탭해서 하기</div>}
                {item.type === "count" && <div className="stampCount">{data.count}/{item.goal}</div>}
              </button>
            );
          })}
        </div>
        {saving && <div className="savingTag">저장 중…</div>}
        {toast && <div className="toast">{toast}</div>}
        {activeItem && (
          <ItemModal
            item={ITEMS.find((i) => i.id === activeItem)}
            data={record.items[activeItem]}
            onClose={() => setActiveItem(null)}
            onUpdate={(patch) => updateItem(activeItem, patch)}
          />
        )}
        <StyleTag />
      </Shell>
    );
  }

  if (stage === "teacherPin") {
    return (
      <Shell>
        <TopBar onBack={goRole} title="선생님 확인" />
        <div style={{ marginTop: 24, textAlign: "center", color: COLORS.sub }}>비밀번호를 입력해주세요</div>
        <input className="pinInput" type="password" inputMode="numeric" value={pinInput}
          onChange={(e) => setPinInput(e.target.value)} placeholder="••••" maxLength={8} />
        {pinError && <div className="pinErr">{pinError}</div>}
        <BigButton color={COLORS.teal} onClick={() => {
          if (pinInput === teacherPin) {
            setPinError("");
            setViewDate(date);
            loadTeacherDay(date);
            setStage("teacher");
          } else {
            setPinError("비밀번호가 달라요. 다시 확인해주세요.");
          }
        }}>확인</BigButton>
        <StyleTag />
      </Shell>
    );
  }

  if (stage === "teacher") {
    const notSubmitted = roster.filter((n) => !dayRecords[n]);
    const submittedNums = Object.keys(dayRecords);
    const fullDone = submittedNums.filter((n) => {
      const rec = dayRecords[n];
      return ITEMS.every((it) => isDone(it, rec.items[it.id]));
    });

    return (
      <Shell wide>
        <TopBar onBack={goRole} title="선생님 대시보드" />

        <div className="teacherRow">
          <label className="dateLabel">날짜
            <input type="date" value={viewDate}
              onChange={(e) => { setViewDate(e.target.value); loadTeacherDay(e.target.value); }} className="dateInput" />
          </label>
          <button className="ghostBtn" onClick={() => loadTeacherDay(viewDate)}>
            {loadingTeacher ? "새로고침 중…" : "🔄 새로고침"}
          </button>
          <button className="ghostBtn" onClick={() => setShowPinChange((v) => !v)}>🔒 비밀번호 변경</button>
        </div>

        {showPinChange && (
          <div className="pinChangeBox">
            <input className="pinChangeInput" placeholder="새 비밀번호" value={pinChangeVal}
              onChange={(e) => setPinChangeVal(e.target.value)} />
            <button className="ghostBtn" onClick={async () => {
              if (pinChangeVal.trim().length < 2) { flashToast("2자 이상으로 정해주세요"); return; }
              try {
                await apiPost("setTeacherPin", { pin: pinChangeVal.trim() });
                setTeacherPin(pinChangeVal.trim());
                setPinChangeVal(""); setShowPinChange(false);
                flashToast("비밀번호를 바꿨어요");
              } catch { flashToast("변경에 실패했어요"); }
            }}>저장</button>
          </div>
        )}

        <div className="statsRow">
          <StatCard label="전체 학생" value={roster.length} color={COLORS.ink} />
          <StatCard label="제출함" value={submittedNums.length} color={COLORS.teal} />
          <StatCard label="미제출" value={notSubmitted.length} color={COLORS.coral} />
          <StatCard label="9개 다 완료" value={fullDone.length} color={COLORS.yellow} />
        </div>

        <SectionTitle>❗ 아직 시작 안 한 친구들</SectionTitle>
        {notSubmitted.length === 0 ? (
          <EmptyBox small>모두 시작했어요! 👍</EmptyBox>
        ) : (
          <ChipRow items={[...notSubmitted].sort((a, b) => a - b).map((n) => `${n}번`)} color={COLORS.coral} />
        )}

        <SectionTitle>📋 아직 못한 것 확인하기</SectionTitle>
        <div className="tabRow">
          <button className={"tabBtn" + (breakdownView === "item" ? " active" : "")} onClick={() => setBreakdownView("item")}>항목별로 보기</button>
          <button className={"tabBtn" + (breakdownView === "student" ? " active" : "")} onClick={() => setBreakdownView("student")}>번호별로 보기</button>
        </div>

        {breakdownView === "item" && (
          <div className="itemBreakdown">
            {ITEMS.map((item) => {
              const undone = roster.filter((n) => !isDone(item, dayRecords[n] ? dayRecords[n].items[item.id] : null));
              return (
                <div key={item.id} className="breakdownCard">
                  <div className="breakdownHead">
                    <span>{item.emoji} {item.title}</span>
                    <span className="breakdownCount">{roster.length - undone.length}/{roster.length}</span>
                  </div>
                  {undone.length === 0 ? (
                    <div className="breakdownAllDone">전원 완료 🎉</div>
                  ) : (
                    <div className="breakdownNames">{[...undone].sort((a, b) => a - b).map((n) => `${n}번`).join(", ")}</div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {breakdownView === "student" && (
          <div className="itemBreakdown">
            {[...roster].sort((a, b) => a - b).map((n) => {
              const rec = dayRecords[n];
              const undoneItems = ITEMS.filter((item) => !isDone(item, rec ? rec.items[item.id] : null));
              return (
                <div key={n} className="breakdownCard">
                  <div className="breakdownHead">
                    <span>{n}번</span>
                    <span className="breakdownCount">{ITEMS.length - undoneItems.length}/{ITEMS.length}</span>
                  </div>
                  {!rec ? (
                    <div className="breakdownNames">아직 시작 안 함</div>
                  ) : undoneItems.length === 0 ? (
                    <div className="breakdownAllDone">전부 완료 🎉</div>
                  ) : (
                    <div className="breakdownNames">{undoneItems.map((item) => `${item.emoji} ${item.title}`).join(", ")}</div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        <SectionTitle>👥 번호 관리</SectionTitle>
        <div className="rosterEdit">
          <input className="numberInput" placeholder="번호" inputMode="numeric" value={newNumber}
            onChange={(e) => setNewNumber(e.target.value)}
            onKeyDown={(e) => {
              if (e.key === "Enter" && newNumber.trim()) {
                const n = Number(newNumber);
                if (n && !roster.includes(n)) saveRosterList([...roster, n]);
                setNewNumber("");
              }
            }} />
          <button className="ghostBtn" onClick={() => {
            const n = Number(newNumber);
            if (!n || roster.includes(n)) return;
            saveRosterList([...roster, n]);
            setNewNumber("");
          }}>추가</button>
        </div>
        <div className="rosterList">
          {[...roster].sort((a, b) => a - b).map((n) => (
            <span key={n} className="rosterChip">
              {n}번
              <button className="rosterMini" onClick={() => viewPin(n)}>PIN보기</button>
              <button className="rosterMini" onClick={() => resetPin(n)}>PIN초기화</button>
              <button className="rosterRemove" onClick={() => saveRosterList(roster.filter((x) => x !== n))}>✕</button>
            </span>
          ))}
        </div>

        {toast && <div className="toast">{toast}</div>}
        <StyleTag />
      </Shell>
    );
  }

  return null;
}

/* ---------------- 하위 UI 조각들 ---------------- */

function Shell({ children, wide }) {
  return (
    <div style={{
      minHeight: "100%", background: COLORS.bg,
      fontFamily: "'Apple SD Gothic Neo','Pretendard','Malgun Gothic','Noto Sans KR',sans-serif",
      padding: "18px 16px 40px", boxSizing: "border-box",
      maxWidth: wide ? 720 : 420, margin: "0 auto", color: COLORS.ink,
    }}>{children}</div>
  );
}

function Center({ children }) {
  return <div style={{ textAlign: "center", padding: "60px 10px", color: COLORS.sub }}>{children}</div>;
}

function Header({ title, subtitle }) {
  return (
    <div style={{ textAlign: "center", paddingTop: 10 }}>
      <div style={{ fontSize: 30, marginBottom: 4 }}>🌱</div>
      <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.3 }}>{title}</div>
      <div style={{ fontSize: 14, color: COLORS.sub, marginTop: 6 }}>{subtitle}</div>
    </div>
  );
}

function TopBar({ onBack, title, right }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
      <button onClick={onBack} style={{ border: "none", background: "transparent", fontSize: 20, cursor: "pointer", color: COLORS.sub, padding: 6 }}>←</button>
      <div style={{ fontSize: 17, fontWeight: 800, flex: 1, textAlign: "center" }}>{title}</div>
      <div>{right}</div>
    </div>
  );
}

function DateChip({ text }) {
  return <span style={{ fontSize: 12, background: "#fff", border: `1px solid ${COLORS.line}`, borderRadius: 999, padding: "5px 10px", color: COLORS.sub, fontWeight: 600 }}>{text}</span>;
}

function BigButton({ children, color, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: color, color: "#fff", border: "none", borderRadius: 18,
      padding: "18px 20px", fontSize: 17, fontWeight: 800, cursor: "pointer",
      boxShadow: "0 6px 0 rgba(0,0,0,0.08)", width: "100%",
    }}>{children}</button>
  );
}

function EmptyBox({ children, small }) {
  return (
    <div style={{
      background: "#fff", border: `1.5px dashed ${COLORS.line}`, borderRadius: 16,
      padding: small ? "16px 14px" : "26px 16px", marginTop: 14, textAlign: "center",
      color: COLORS.sub, fontSize: small ? 13 : 14, lineHeight: 1.6,
    }}>{children}</div>
  );
}

function ProgressBar({ done, total, allDone }) {
  const pct = Math.round((done / total) * 100);
  return (
    <div style={{ marginTop: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: COLORS.sub, marginBottom: 6 }}>
        <span>오늘의 미션</span>
        <span style={{ fontWeight: 800, color: allDone ? COLORS.teal : COLORS.ink }}>{done} / {total}</span>
      </div>
      <div style={{ height: 12, background: "#fff", borderRadius: 999, border: `1px solid ${COLORS.line}`, overflow: "hidden" }}>
        <div style={{
          height: "100%", width: `${pct}%`, borderRadius: 999,
          background: allDone ? COLORS.teal : `linear-gradient(90deg, ${COLORS.yellow}, ${COLORS.teal})`,
          transition: "width .3s ease",
        }} />
      </div>
    </div>
  );
}

function StatCard({ label, value, color }) {
  return (
    <div style={{ background: "#fff", borderRadius: 14, padding: "12px 10px", textAlign: "center", border: `1px solid ${COLORS.line}`, flex: 1 }}>
      <div style={{ fontSize: 22, fontWeight: 800, color }}>{value}</div>
      <div style={{ fontSize: 12, color: COLORS.sub, marginTop: 2 }}>{label}</div>
    </div>
  );
}

function SectionTitle({ children }) {
  return <div style={{ fontSize: 15, fontWeight: 800, marginTop: 24, marginBottom: 8 }}>{children}</div>;
}

function ChipRow({ items, color }) {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
      {items.map((n, i) => (
        <span key={i} style={{ background: `${color}18`, color, border: `1px solid ${color}55`, borderRadius: 999, padding: "5px 11px", fontSize: 13, fontWeight: 700 }}>{n}</span>
      ))}
    </div>
  );
}

function ItemModal({ item, data, onClose, onUpdate }) {
  return (
    <div className="modalBackdrop" onClick={onClose}>
      <div className="modalCard" onClick={(e) => e.stopPropagation()}>
        <div className="modalHead">
          <span>{item.emoji} {item.title}</span>
          <button className="modalClose" onClick={onClose}>✕</button>
        </div>
        <div className="modalDesc">{item.desc}</div>

        {item.type === "count" && (
          <div className="countBox">
            <div className="countNum">{data.count} / {item.goal}</div>
            <div className="countBtnRow">
              <button className="countBtn" onClick={() => onUpdate({ count: Math.max(0, data.count - 1) })}>−1</button>
              <button className="countBtnMain" onClick={() => onUpdate({ count: data.count + 1 })}>발표했어요! +1</button>
            </div>
          </div>
        )}

        {item.type === "check" && (
          <div className="fieldStack">
            <button className={"checkToggle" + (data.done ? " on" : "")} onClick={() => onUpdate({ done: !data.done })}>
              {data.done ? "✔ 오늘 다 했어요" : "다 했으면 눌러주세요"}
            </button>
          </div>
        )}

        <button className="modalDoneBtn" onClick={onClose}>닫기</button>
      </div>
    </div>
  );
}

      .stampHint { font-size:10px; color:${COLORS.sub}; margin-top:4px; }
      .stampCheck { font-size:14px; color:${COLORS.teal}; font-weight:800; margin-top:4px; }
      .stampCount { font-size:10px; color:${COLORS.sub}; margin-top:2px; font-weight:700; }
      .celebrate { margin-top:14px; text-align:center; background:${COLORS.yellow}33; color:#8a6400; border-radius:14px; padding:10px; font-weight:800; font-size:14px; }

      .modalDesc { color:${COLORS.sub}; font-size:13px; margin:6px 0 16px; }
      .modalDoneBtn { margin-top:18px; width:100%; background:${COLORS.ink}; color:#fff; border:none; border-radius:14px; padding:12px; font-weight:800; font-size:14px; cursor:pointer; }
      .fieldStack { display:flex; flex-direction:column; gap:6px; }
      .countBox { text-align:center; }
      .countNum { font-size:30px; font-weight:800; color:${COLORS.teal}; margin-bottom:12px; }
      .countBtnRow { display:flex; gap:8px; }

      .pinErr { text-align:center; color:${COLORS.coral}; font-size:12px; margin-bottom:12px; margin-top:8px; }
      .teacherRow { display:flex; gap:8px; align-items:center; margin-top:16px; flex-wrap:wrap; }

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
